services:
  db:
    image: postgres:16-alpine
    container_name: skills-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillshub
      POSTGRES_PASSWORD: skillshub_dev
      POSTGRES_DB: skillshub
    ports:
      - "5433:5432"
    volumes:
      - skillshub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillshub"]
      interval: 5s
      timeout: 3s
      retries: 10
  rustfs:
    image: rustfs/rustfs:latest
    container_name: skills-hub-rustfs
    environment:
      RUSTFS_ACCESS_KEY: skillshub
      RUSTFS_SECRET_KEY: skillshub_dev
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["--address", ":9000", "--console-enable", "--access-key", "skillshub", "--secret-key", "skillshub_dev", "/data"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
volumes:
  skillshub_pgdata:
  rustfs_data:
