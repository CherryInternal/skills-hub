name: Docker

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ALIYUN_REGISTRY: "${{ vars.ALIYUN_REGISTRY || 'cherry-prod-docker-registry-registry.cn-hangzhou.cr.aliyuncs.com' }}"
  ALIYUN_NAMESPACE: "${{ vars.ALIYUN_NAMESPACE || 'cherry' }}"
  ALIYUN_REPOSITORY: "${{ vars.ALIYUN_REPOSITORY || 'skills-hub' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Aliyun ACR credentials
        id: acr
        env:
          ALIYUN_DOCKER_USERNAME: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          ALIYUN_DOCKER_PASSWORD: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}
        run: |
          if [ -n "$ALIYUN_DOCKER_USERNAME" ] && [ -n "$ALIYUN_DOCKER_PASSWORD" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Aliyun ACR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.acr.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Skip image push
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.acr.outputs.can_push != 'true'
        run: echo "::warning::ALIYUN_DOCKER_USERNAME and ALIYUN_DOCKER_PASSWORD secrets are not configured; building image without pushing."

      - name: Build image
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main' || steps.acr.outputs.can_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

      - name: Build and push image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.acr.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPOSITORY }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPOSITORY }}:sha-${{ github.sha }}
